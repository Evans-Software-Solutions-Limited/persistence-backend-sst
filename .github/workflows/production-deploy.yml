name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to deploy (branch or tag, e.g. v1.0.0). Leave empty to use the branch selected when running."
        required: false

# Only one production deploy at a time to avoid SST lock conflicts
concurrency:
  group: sst-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          restore_cache: "false"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: Production
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Prettier
        run: bun run prettier:check

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --dry-run --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Unlock SST (clear stale lock from previous runs)
        run: bunx sst unlock --stage production || true

      # SST secrets must be set per-stage in SSM before `sst deploy` runs;
      # `databaseUrl.value` in `infra/api.ts` resolves at deploy time from
      # the production-stage secret slot. Setting them here makes CI the
      # source of truth — drift between a developer's `sst secret set`
      # and the deployed Lambda is impossible. See deploy-staging.yml for
      # the matching staging-stage step + the 2026-05-04 incident this
      # closes. While the project is on a single shared Supabase project,
      # the `DATABASE_URL` GH secret on the Production environment is
      # identical to the staging one; once production gets its own
      # Supabase project, only the per-environment secret value diverges.
      - name: Set SST secrets (PersistenceDatabaseUrl)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set on the Production GitHub environment."
            echo "Add it under Settings → Environments → Production → Secrets."
            echo "Expected format:"
            echo "  postgresql://postgres.<ref>:<password>@aws-1-<region>.pooler.supabase.com:6543/postgres"
            exit 1
          fi
          bunx sst secret set PersistenceDatabaseUrl "$DATABASE_URL" --stage production

      # Stripe secrets used by the SST API Lambda for outbound SDK calls
      # (subscriptionCreate/cancel) AND inbound webhook signature
      # verification. Both must be set or the deploy fails fast — without
      # the webhook secret an attacker could forge events and mutate
      # user_subscriptions; without the API key outbound endpoints throw
      # at first SDK call. Use sk_live_… on production.
      - name: Set SST secrets (Stripe)
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::error::STRIPE_SECRET_KEY is not set on the Production GitHub environment."
            echo "Add it under Settings → Environments → Production → Secrets (expected: sk_live_…)."
            exit 1
          fi
          if [ -z "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "::error::STRIPE_WEBHOOK_SECRET is not set on the Production GitHub environment."
            echo "Add it under Settings → Environments → Production → Secrets (expected: whsec_…)."
            echo "Issued by Stripe when the webhook endpoint is registered against the production API URL."
            exit 1
          fi
          bunx sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage production
          bunx sst secret set StripeWebhookSecret "$STRIPE_WEBHOOK_SECRET" --stage production

      - name: Deploy
        run: bunx sst deploy --stage production
