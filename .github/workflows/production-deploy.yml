name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to deploy (branch or tag, e.g. v1.0.0). Leave empty to use the branch selected when running."
        required: false

# Only one production deploy at a time to avoid SST lock conflicts
concurrency:
  group: sst-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          restore_cache: "false"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: Production
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.ref || github.ref }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Prettier
        run: bun run prettier:check

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --dry-run --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Unlock SST (clear stale lock from previous runs)
        run: bunx sst unlock --stage production || true

      # All SST secrets are set per-stage in SSM BEFORE `sst deploy` runs so
      # CI is the single source of truth — drift between a developer's local
      # `sst secret set` and the deployed Lambda is impossible (see
      # deploy-staging.yml + the 2026-05-04 incident this closes). Every
      # secret fails fast when its GitHub environment value is missing: an
      # empty DB url re-creates that incident, an empty Stripe/RevenueCat
      # webhook secret lets an attacker forge events and mutate
      # user_subscriptions, and an empty RevenueCat API key/project id breaks
      # entitlement sync at the first REST call. Production uses live values
      # (sk_live_…). While the project is on a single shared Supabase project,
      # the Production `DATABASE_URL` equals staging's; it diverges once
      # production gets its own Supabase project.
      - name: Set SST secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECATAPIKEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECATPROJECTID }}
          REVENUECAT_WEBHOOK_SECRET: ${{ secrets.REVENUECATWEBHOOKSECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Expo Push (09.9 / A3). OPTIONAL — only needed if "Enhanced Security
          # for Push" is enabled on the Expo account. NOT fail-fast: an empty
          # value is valid (the send client omits the Authorization header).
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set on the Production GitHub environment."
            echo "Add it under Settings → Environments → Production → Secrets."
            echo "Expected format:"
            echo "  postgresql://postgres.<ref>:<password>@aws-1-<region>.pooler.supabase.com:6543/postgres"
            exit 1
          fi
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::error::STRIPE_SECRET_KEY is not set on the Production GitHub environment (expected: sk_live_…)."
            exit 1
          fi
          if [ -z "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "::error::STRIPE_WEBHOOK_SECRET is not set on the Production GitHub environment (expected: whsec_…, issued by Stripe for the production webhook endpoint)."
            exit 1
          fi
          if [ -z "$REVENUECAT_API_KEY" ]; then
            echo "::error::REVENUECATAPIKEY is not set on the Production GitHub environment (expected: the RevenueCat secret REST API key, sk_…)."
            exit 1
          fi
          if [ -z "$REVENUECAT_PROJECT_ID" ]; then
            echo "::error::REVENUECATPROJECTID is not set on the Production GitHub environment (the RevenueCat project id for the v2 REST paths)."
            exit 1
          fi
          if [ -z "$REVENUECAT_WEBHOOK_SECRET" ]; then
            echo "::error::REVENUECATWEBHOOKSECRET is not set on the Production GitHub environment (the Authorization header value configured on the RevenueCat webhook)."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is not set on the Production GitHub environment."
            echo "Find it in Supabase Dashboard → Project Settings → API → service_role key."
            echo "Required for in-app account deletion (Apple Guideline 5.1.1(v))."
            exit 1
          fi
          bunx sst secret set PersistenceDatabaseUrl "$DATABASE_URL" --stage production
          bunx sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage production
          bunx sst secret set StripeWebhookSecret "$STRIPE_WEBHOOK_SECRET" --stage production
          bunx sst secret set RevenueCatApiKey "$REVENUECAT_API_KEY" --stage production
          bunx sst secret set RevenueCatProjectId "$REVENUECAT_PROJECT_ID" --stage production
          bunx sst secret set RevenueCatWebhookSecret "$REVENUECAT_WEBHOOK_SECRET" --stage production
          bunx sst secret set SupabaseServiceRoleKey "$SUPABASE_SERVICE_ROLE_KEY" --stage production
          # Optional — safe to set empty; the client omits the auth header when blank.
          bunx sst secret set ExpoAccessToken "$EXPO_ACCESS_TOKEN" --stage production

      - name: Deploy
        run: bunx sst deploy --stage production
