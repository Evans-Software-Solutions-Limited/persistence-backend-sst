name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to open/update the release PR against (default: main)"
        required: false
        default: "main"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.event.inputs.target_branch || 'main' }}
