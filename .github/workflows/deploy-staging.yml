name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one staging deploy at a time to avoid SST lock conflicts
concurrency:
  group: persistence-sst-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    # Skip the release-please bot's own push (chore(main): release …) — production-deploy.yml
    # fires on the resulting GitHub release. `startsWith` matches only the commit subject (first
    # line), so a feature commit body that happens to mention "release" no longer triggers a skip.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push'
              && !startsWith(github.event.head_commit.message, 'chore(main): release')
              && !startsWith(github.event.head_commit.message, 'release-please')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          restore_cache: "false"

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Prettier
        run: bun run prettier:check

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --dry-run --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Unlock SST (clear stale lock from previous runs)
        run: bunx sst unlock --stage staging || true

      - name: Deploy
        run: bunx sst deploy --stage staging
