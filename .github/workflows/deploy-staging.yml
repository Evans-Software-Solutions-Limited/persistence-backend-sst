name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one staging deploy at a time to avoid SST lock conflicts
concurrency:
  group: persistence-sst-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    # Skip the release-please bot's own push (chore(main): release …) — production-deploy.yml
    # fires on the resulting GitHub release. `startsWith` matches only the commit subject (first
    # line), so a feature commit body that happens to mention "release" no longer triggers a skip.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push'
              && !startsWith(github.event.head_commit.message, 'chore(main): release')
              && !startsWith(github.event.head_commit.message, 'release-please')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          restore_cache: "false"

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Prettier
        run: bun run prettier:check

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --dry-run --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Unlock SST (clear stale lock from previous runs)
        run: bunx sst unlock --stage staging || true

      # All SST secrets are set per-stage in SSM BEFORE `sst deploy` runs so
      # CI is the single source of truth — drift between a developer's local
      # `sst secret set` and the deployed Lambda is impossible (the 2026-05-04
      # staging incident traced to exactly that gap). Every secret fails fast
      # when its GitHub environment value is missing: silently setting an empty
      # string would re-create that incident, an empty Stripe/RevenueCat
      # webhook secret would let an attacker forge events and mutate
      # user_subscriptions, and an empty RevenueCat API key/project id breaks
      # entitlement sync at the first REST call. Staging uses test/sandbox
      # values (sk_test_…).
      - name: Set SST secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECATAPIKEY }}
          REVENUECAT_PROJECT_ID: ${{ secrets.REVENUECATPROJECTID }}
          REVENUECAT_WEBHOOK_SECRET: ${{ secrets.REVENUECATWEBHOOKSECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Expo Push (09.9 / A3). OPTIONAL — only needed if "Enhanced Security
          # for Push" is enabled on the Expo account. NOT fail-fast: an empty
          # value is valid (the send client omits the Authorization header).
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set on the staging GitHub environment."
            echo "Add it under Settings → Environments → staging → Secrets."
            echo "Expected format:"
            echo "  postgresql://postgres.<ref>:<password>@aws-1-<region>.pooler.supabase.com:6543/postgres"
            exit 1
          fi
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::error::STRIPE_SECRET_KEY is not set on the staging GitHub environment (expected: sk_test_…)."
            exit 1
          fi
          if [ -z "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "::error::STRIPE_WEBHOOK_SECRET is not set on the staging GitHub environment (expected: whsec_…, issued by Stripe for the staging webhook endpoint)."
            exit 1
          fi
          if [ -z "$REVENUECAT_API_KEY" ]; then
            echo "::error::REVENUECATAPIKEY is not set on the staging GitHub environment (expected: the RevenueCat secret REST API key, sk_…)."
            exit 1
          fi
          if [ -z "$REVENUECAT_PROJECT_ID" ]; then
            echo "::error::REVENUECATPROJECTID is not set on the staging GitHub environment (the RevenueCat project id for the v2 REST paths)."
            exit 1
          fi
          if [ -z "$REVENUECAT_WEBHOOK_SECRET" ]; then
            echo "::error::REVENUECATWEBHOOKSECRET is not set on the staging GitHub environment (the Authorization header value configured on the RevenueCat webhook)."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is not set on the staging GitHub environment."
            echo "Find it in Supabase Dashboard → Project Settings → API → service_role key."
            echo "Required for in-app account deletion (Apple Guideline 5.1.1(v))."
            exit 1
          fi
          bunx sst secret set PersistenceDatabaseUrl "$DATABASE_URL" --stage staging
          bunx sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage staging
          bunx sst secret set StripeWebhookSecret "$STRIPE_WEBHOOK_SECRET" --stage staging
          bunx sst secret set RevenueCatApiKey "$REVENUECAT_API_KEY" --stage staging
          bunx sst secret set RevenueCatProjectId "$REVENUECAT_PROJECT_ID" --stage staging
          bunx sst secret set RevenueCatWebhookSecret "$REVENUECAT_WEBHOOK_SECRET" --stage staging
          bunx sst secret set SupabaseServiceRoleKey "$SUPABASE_SERVICE_ROLE_KEY" --stage staging
          # Optional — safe to set empty; the client omits the auth header when blank.
          bunx sst secret set ExpoAccessToken "$EXPO_ACCESS_TOKEN" --stage staging

      - name: Deploy
        run: bunx sst deploy --stage staging
