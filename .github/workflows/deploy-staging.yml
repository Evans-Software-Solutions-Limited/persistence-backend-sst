name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one staging deploy at a time to avoid SST lock conflicts
concurrency:
  group: persistence-sst-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    # Skip the release-please bot's own push (chore(main): release …) — production-deploy.yml
    # fires on the resulting GitHub release. `startsWith` matches only the commit subject (first
    # line), so a feature commit body that happens to mention "release" no longer triggers a skip.
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push'
              && !startsWith(github.event.head_commit.message, 'chore(main): release')
              && !startsWith(github.event.head_commit.message, 'release-please')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          restore_cache: "false"

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Prettier
        run: bun run prettier:check

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --dry-run --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migrate database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Unlock SST (clear stale lock from previous runs)
        run: bunx sst unlock --stage staging || true

      # SST secrets must be set per-stage in SSM before `sst deploy` runs;
      # `databaseUrl.value` in `infra/api.ts` resolves at deploy time from
      # the staging-stage secret slot. Setting them here makes CI the
      # source of truth — drift between a developer's `sst secret set`
      # and the deployed Lambda is impossible. The 2026-05-04 staging
      # incident traced back to a developer-side `sst secret set` that
      # never made it onto the staging stage; this step closes that gap.
      #
      # Fail fast if the GH environment secret is missing — silently
      # setting an empty string would re-create the same incident.
      - name: Set SST secrets (PersistenceDatabaseUrl)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set on the staging GitHub environment."
            echo "Add it under Settings → Environments → staging → Secrets."
            echo "Expected format:"
            echo "  postgresql://postgres.<ref>:<password>@aws-1-<region>.pooler.supabase.com:6543/postgres"
            exit 1
          fi
          bunx sst secret set PersistenceDatabaseUrl "$DATABASE_URL" --stage staging

      # Stripe secrets used by the SST API Lambda for outbound SDK calls
      # (subscriptionCreate/cancel) AND inbound webhook signature
      # verification. Both must be set or the deploy fails fast — without
      # the webhook secret an attacker could forge events and mutate
      # user_subscriptions; without the API key outbound endpoints throw
      # at first SDK call. Use sk_test_… on staging.
      - name: Set SST secrets (Stripe)
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "::error::STRIPE_SECRET_KEY is not set on the staging GitHub environment."
            echo "Add it under Settings → Environments → staging → Secrets (expected: sk_test_…)."
            exit 1
          fi
          if [ -z "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "::error::STRIPE_WEBHOOK_SECRET is not set on the staging GitHub environment."
            echo "Add it under Settings → Environments → staging → Secrets (expected: whsec_…)."
            echo "Issued by Stripe when the webhook endpoint is registered against the staging API URL."
            exit 1
          fi
          bunx sst secret set StripeSecretKey "$STRIPE_SECRET_KEY" --stage staging
          bunx sst secret set StripeWebhookSecret "$STRIPE_WEBHOOK_SECRET" --stage staging

      - name: Deploy
        run: bunx sst deploy --stage staging
