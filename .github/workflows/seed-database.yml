name: Seed Database

# Manual, on-demand seeding of reference/catalog data into a stage's Supabase
# project. Uses that GitHub Environment's `DATABASE_URL` secret (the Supabase
# transaction pooler, port 6543) — the SAME secret the deploy workflow sets as
# the SST `PersistenceDatabaseUrl`. Both seed scripts are idempotent (upsert on
# natural keys), so re-running is safe.
#
# ⚠ FOODS ORDERING: `foods` rows carry `serving_quantity` only if the committed
# `packages/seed/data/off-uk.jsonl.gz` was regenerated by `refresh-off-dump.yml`
# (or `bun run refresh:foods` locally) first. Run/refresh the dump BEFORE seeding
# foods on a fresh project, else serving_quantity lands NULL (mobile Serving tab
# then falls back to servingSize=100g).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (uses that env's DATABASE_URL secret)"
        type: choice
        options:
          - staging
          - Production
        required: true
      dataset:
        description: "What to seed"
        type: choice
        options:
          - exercises
          - foods
          - both
        default: exercises
        required: true

# Never let two seed runs hit the same DB concurrently.
concurrency:
  group: seed-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  seed:
    name: Seed ${{ github.event.inputs.dataset }} → ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      # Fail fast with a clear message rather than a confusing driver error if
      # the environment is missing its pooled connection string.
      - name: Verify DATABASE_URL is set
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set on the ${{ github.event.inputs.environment }} GitHub environment."
            echo "Add it under Settings → Environments → ${{ github.event.inputs.environment }} → Secrets."
            echo "Expected: postgresql://postgres.<ref>:<password>@aws-1-eu-west-2.pooler.supabase.com:6543/postgres"
            exit 1
          fi
          echo "DATABASE_URL present for ${{ github.event.inputs.environment }}."

      - name: Seed exercises (muscle groups, equipment, exercise library)
        if: ${{ github.event.inputs.dataset == 'exercises' || github.event.inputs.dataset == 'both' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Bulk one-shot seed → SESSION pooler (5432), NOT the Lambda
          # transaction pooler (6543). Transaction mode parks the client
          # connection between transactions with no server backend, wedging
          # the multi-statement seed (client hangs, zero DB-side activity —
          # verified via pg_stat_activity). Same host + creds, only the port.
          export DATABASE_URL="$(printf '%s' "$DATABASE_URL" | sed 's|:6543/|:5432/|')"
          bun run seed:exercises

      - name: Seed foods (~146k OFF UK)
        if: ${{ github.event.inputs.dataset == 'foods' || github.event.inputs.dataset == 'both' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # SESSION pooler (5432) for the bulk seed — see the exercises step.
          export DATABASE_URL="$(printf '%s' "$DATABASE_URL" | sed 's|:6543/|:5432/|')"
          bun run seed:foods
